server.port=8080
spring.application.name=ParcouComp
spring.thymeleaf.cache=false
server.error.include-exception=false
server.error.include-message=never

# API Football-Data.org
football.api.key=11363b42c2384dca874a83fe6d6e4c74
football.api.url=https://api.football-data.org/v4

# H2 Database - Fichier unique persistant
#spring.datasource.url=jdbc:h2:file:./parcoucomp_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/parcoucomp_db
spring.datasource.username=parcoucomp_user
spring.datasource.password=parcoucomp_mdp
spring.datasource.driver-class-name=org.postgresql.Driver

# H2 Console (accessible sur http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false