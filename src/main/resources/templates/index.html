    <style>
        body { background: linear-gradient(145deg, #0a2f1f 0%, #0a1f12 100%); }

        .main-container {
            max-width: 95vw !important;

            }

            padding-left: 1rem !important;

        @media (min-width: 768px) {
            .content-padding {

                padding-right: 2rem !important;
            }

        @media (min-width: 1280px) {
            .content-padding {

                padding-right: 3rem !important;
            }

        .match-card { transition: all 0.2s; cursor: pointer; }
        .match-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.1); }
        .group-winner { border-left: 4px solid #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .group-runner { border-left: 4px solid #94a3b8; background: rgba(148, 163, 184, 0.05); }
        .winner-badge { background: #fbbf24; color: #000; font-weight: bold; border-radius: 0.5rem; padding: 0.25rem 0.5rem; display: inline-block; }
        .official-match { background: rgba(34, 197, 94, 0.2); border-left: 4px solid #22c55e; }
        .diff-match { background: rgba(251, 146, 60, 0.2); border-left: 4px solid #f97316; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #fbbf24; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .notification { position: fixed; top: 20px; right: 20px; z-index: 1000; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .scroll-top-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);

        @media (max-width: 640px) {
            .scroll-top-btn { width: 45px; height: 45px; bottom: 15px; right: 15px; }
            .scroll-top-btn i { font-size: 1.3rem; }
        }

        .score-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .score-modal-content {
            background: linear-gradient(145deg, #1a3a2a, #0a2f1f);
            border-radius: 1.5rem;
            padding: 1.5rem;
            max-width: 350px;
            width: 90%;
            border: 2px solid #fbbf24;

        }
        .score-input { font-size: 2.5rem; text-align: center; width: 90px; background: #00000066; border: 2px solid #fbbf24; border-radius: 1rem; color: #fbbf24; font-weight: bold; padding: 0.5rem; }
        .score-separator { font-size: 2.5rem; font-weight: bold; color: #fbbf24; }
        @media (min-width: 768px) {
            .score-input { font-size: 3rem; width: 120px; }
            .score-separator { font-size: 3rem; }
            .score-modal-content { padding: 2rem; max-width: 400px; }
        }

        /* ========== STYLE BRACKET AVEC LIGNES DE CONNEXION ========== */
        .tournament-bracket {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 1rem;
            min-height: 600px;
        }
        @media (min-width: 768px) {
            .tournament-bracket { gap: 1.5rem; }
        }

        .bracket-column {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            position: relative;
            min-width: 230px;
        }

            .bracket-column { min-width: 200px; }

        .round-header {
            text-align: center;

            padding: 0.5rem;

            background: linear-gradient(135deg, rgba(251, 191, 36, 0.25), rgba(245, 158, 11, 0.1));
            border-radius: 0.5rem;
            font-size: 0.8rem;
            letter-spacing: 1px;
            border: 1px solid rgba(251, 191, 36, 0.4);
            white-space: nowrap;

        @media (min-width: 768px) {
            .round-header { font-size: 0.9rem; padding: 0.6rem; }

        .bracket-match-item {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 0.5rem;
            padding: 0.5rem;
            margin: 0.4rem 0;
            border-left: 3px solid #fbbf24;
            cursor: pointer;
            transition: all 0.2s;

            width: 0.75rem;
            height: 2px;
            background: #fbbf24;
            top: 50%;
            opacity: 0.6;
            z-index: 5;
        }
        .connector-v {
            position: absolute;
            right: -0.75rem;
            width: 2px;
            background: #fbbf24;
            opacity: 0.4;
            z-index: 5;
        }

        /* Animation des lignes */
        @keyframes linePulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        .connector-h, .connector-v {
            animation: linePulse 2s ease-in-out infinite;

<script>
    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
    window.addEventListener('scroll', function() {
        const btn = document.getElementById('scrollTopBtn');
        if (window.scrollY > 300) btn.classList.add('show');
        else btn.classList.remove('show');
    });

    const teamNamesFr = {
        'Mexico': 'Mexique', 'South Africa': 'Afrique du Sud', 'South Korea': 'Corée du Sud',
        'Czechia': 'République Tchèque', 'Canada': 'Canada', 'Bosnia-Herzegovina': 'Bosnie-Herzégovine',
        'Qatar': 'Qatar', 'Switzerland': 'Suisse', 'Brazil': 'Brésil', 'Haiti': 'Haïti',
        'Scotland': 'Écosse', 'Morocco': 'Maroc', 'United States': 'États-Unis', 'Paraguay': 'Paraguay',
        'Australia': 'Australie', 'Turkey': 'Turquie', 'Germany': 'Allemagne', 'Curaçao': 'Curaçao',
        'Ivory Coast': 'Côte d\'Ivoire', 'Ecuador': 'Équateur', 'Netherlands': 'Pays-Bas',
        'Japan': 'Japon', 'Sweden': 'Suède', 'Tunisia': 'Tunisie', 'Belgium': 'Belgique',
        'Egypt': 'Égypte', 'Iran': 'Iran', 'New Zealand': 'Nouvelle-Zélande', 'Spain': 'Espagne',
        'Cape Verde Islands': 'Cap-Vert', 'Saudi Arabia': 'Arabie Saoudite', 'Uruguay': 'Uruguay',
        'France': 'France', 'Senegal': 'Sénégal', 'Iraq': 'Irak', 'Norway': 'Norvège',
        'Argentina': 'Argentine', 'Algeria': 'Algérie', 'Austria': 'Autriche', 'Jordan': 'Jordanie',
        'Portugal': 'Portugal', 'Congo DR': 'RD Congo', 'Uzbekistan': 'Ouzbékistan', 'Colombia': 'Colombie',
        'England': 'Angleterre', 'Croatia': 'Croatie', 'Ghana': 'Ghana', 'Panama': 'Panama'
    };

    const groupsConfig = {
        'Groupe A': { teams: ['Mexique', 'Afrique du Sud', 'Corée du Sud', 'République Tchèque'], matches: [] },
        'Groupe B': { teams: ['Canada', 'Bosnie-Herzégovine', 'Qatar', 'Suisse'], matches: [] },
        'Groupe C': { teams: ['Brésil', 'Haïti', 'Écosse', 'Maroc'], matches: [] },
        'Groupe D': { teams: ['États-Unis', 'Paraguay', 'Australie', 'Turquie'], matches: [] },
        'Groupe E': { teams: ['Allemagne', 'Curaçao', "Côte d\'Ivoire", 'Équateur'], matches: [] },
        'Groupe F': { teams: ['Pays-Bas', 'Japon', 'Suède', 'Tunisie'], matches: [] },
        'Groupe G': { teams: ['Belgique', 'Égypte', 'Iran', 'Nouvelle-Zélande'], matches: [] },
        'Groupe H': { teams: ['Espagne', 'Cap-Vert', 'Arabie Saoudite', 'Uruguay'], matches: [] },
        'Groupe I': { teams: ['France', 'Sénégal', 'Irak', 'Norvège'], matches: [] },
        'Groupe J': { teams: ['Argentine', 'Algérie', 'Autriche', 'Jordanie'], matches: [] },
        'Groupe K': { teams: ['Portugal', 'RD Congo', 'Ouzbékistan', 'Colombie'], matches: [] },
        'Groupe L': { teams: ['Angleterre', 'Croatie', 'Ghana', 'Panama'], matches: [] }
    };

    const flagMap = {
        'Mexique': '🇲🇽', 'Afrique du Sud': '🇿🇦', 'Corée du Sud': '🇰🇷', 'République Tchèque': '🇨🇿',
        'Canada': '🇨🇦', 'Bosnie-Herzégovine': '🇧🇦', 'Qatar': '🇶🇦', 'Suisse': '🇨🇭',
        'Brésil': '🇧🇷', 'Haïti': '🇭🇹', 'Écosse': '🏴󠁧󠁢󠁳󠁣󠁴󠁿', 'Maroc': '🇲🇦',
        'États-Unis': '🇺🇸', 'Paraguay': '🇵🇾', 'Australie': '🇦🇺', 'Turquie': '🇹🇷',
        'Allemagne': '🇩🇪', 'Curaçao': '🇨🇼', 'Côte d\'Ivoire': '🇨🇮', 'Équateur': '🇪🇨',
        'Pays-Bas': '🇳🇱', 'Japon': '🇯🇵', 'Suède': '🇸🇪', 'Tunisie': '🇹🇳',
        'Belgique': '🇧🇪', 'Égypte': '🇪🇬', 'Iran': '🇮🇷', 'Nouvelle-Zélande': '🇳🇿',
        'Espagne': '🇪🇸', 'Cap-Vert': '🇨🇻', 'Arabie Saoudite': '🇸🇦', 'Uruguay': '🇺🇾',
        'France': '🇫🇷', 'Sénégal': '🇸🇳', 'Irak': '🇮🇶', 'Norvège': '🇳🇴',
        'Argentine': '🇦🇷', 'Algérie': '🇩🇿', 'Autriche': '🇦🇹', 'Jordanie': '🇯🇴',
        'Portugal': '🇵🇹', 'RD Congo': '🇨🇩', 'Ouzbékistan': '🇺🇿', 'Colombia': '🇨🇴',
        'Angleterre': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'Croatie': '🇭🇷', 'Ghana': '🇬🇭', 'Panama': '🇵🇦'
    };

    let groupStandings = {};
    let knockoutWinners = {};
    let currentView = 'groups';
    let isSaving = false;
    let mode = 'prediction';
    let syncInterval = null;
    let lastSyncTime = null;

    const API_BASE = '/api/predictions';
    const FIFA_API_BASE = '/api/fifa';

    function showNotification(message, type = 'info') {
        const colors = { info: 'bg-blue-600', success: 'bg-green-600', warning: 'bg-orange-600' };
        const notification = document.createElement('div');
        notification.className = `notification ${colors[type]} text-white px-4 py-2 md:px-6 md:py-3 rounded-lg shadow-lg text-xs md:text-sm`;
        notification.innerHTML = message;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 4000);
    }

    function getFlagEmoji(team) { return flagMap[team] || '⚽'; }

    function openScoreModal(matchKey, homeTeam, awayTeam, currentHome, currentAway) {
        if (mode === 'official') {
            showNotification('⚠️ Mode Officiel - Les scores sont synchronisés avec l\'UEFA', 'warning');
            return;
        }
        const modal = document.createElement('div');
        modal.className = 'score-modal';
        modal.innerHTML = `
            <div class="score-modal-content">
                <h3 class="text-lg md:text-xl font-bold text-center text-yellow-400 mb-3 md:mb-4">📝 Entrer le score</h3>
                <div class="flex items-center justify-center gap-2 md:gap-4 mb-4 md:mb-6">
                    <div class="text-center">
                        <div class="text-2xl md:text-3xl mb-1 md:mb-2">${getFlagEmoji(homeTeam)}</div>
                        <div class="text-xs md:text-sm font-semibold">${escapeHtml(homeTeam)}</div>
                        <input type="number" id="homeScore" class="score-input text-center" value="${currentHome}" min="0" max="20" step="1">
                    </div>
                    <span class="score-separator">-</span>
                    <div class="text-center">
                        <div class="text-2xl md:text-3xl mb-1 md:mb-2">${getFlagEmoji(awayTeam)}</div>
                        <div class="text-xs md:text-sm font-semibold">${escapeHtml(awayTeam)}</div>
                        <input type="number" id="awayScore" class="score-input text-center" value="${currentAway}" min="0" max="20" step="1">
                    </div>
                </div>
                <div class="flex gap-2 md:gap-3">
                    <button onclick="this.closest('.score-modal').remove()" class="flex-1 bg-gray-600 hover:bg-gray-500 py-2 rounded-lg transition text-sm">Annuler</button>
                    <button id="confirmScoreBtn" class="flex-1 bg-yellow-600 hover:bg-yellow-500 py-2 rounded-lg transition font-semibold text-sm">Valider</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        setTimeout(() => document.getElementById('homeScore')?.focus(), 100);
        document.getElementById('confirmScoreBtn').onclick = () => {
            const homeScore = parseInt(document.getElementById('homeScore').value) || 0;
            const awayScore = parseInt(document.getElementById('awayScore').value) || 0;
            modal.remove();
            saveScore(matchKey, homeScore, awayScore);
            showNotification(`✅ ${homeTeam} ${homeScore} - ${awayScore} ${awayTeam}`, 'success');
        };
        const handleKeyPress = (e) => { if (e.key === 'Enter') document.getElementById('confirmScoreBtn').click(); };
        document.getElementById('homeScore')?.addEventListener('keypress', handleKeyPress);
        document.getElementById('awayScore')?.addEventListener('keypress', handleKeyPress);
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function syncWithOfficial() {
        try {
            const response = await fetch(`${FIFA_API_BASE}/matches`);
            const data = await response.json();
            let changesCount = 0;
            for (let match of data.matches || []) {
                if (match.status === 'FINISHED' && match.score?.fullTime?.home !== null) {
                    const groupName = match.group ? `Groupe ${match.group.replace('GROUP_', '')}` : null;
                    if (!groupName) continue;
                    let homeTeamEn = match.homeTeam?.name, awayTeamEn = match.awayTeam?.name;
                    if (!homeTeamEn || !awayTeamEn) continue;
                    const homeTeam = teamNamesFr[homeTeamEn] || homeTeamEn;
                    const awayTeam = teamNamesFr[awayTeamEn] || awayTeamEn;
                    const matchKey = `${groupName}_${homeTeam}_${awayTeam}`;
                    const realHome = match.score.fullTime.home, realAway = match.score.fullTime.away;
                    for (let group in groupsConfig) {
                        const foundMatch = groupsConfig[group].matches.find(m => m.key === matchKey);
                        if (foundMatch && (!foundMatch.played || foundMatch.homeScore !== realHome || foundMatch.awayScore !== realAway)) {
                            foundMatch.homeScore = realHome; foundMatch.awayScore = realAway;
                            foundMatch.played = true; foundMatch.isOfficial = true;
                            localStorage.setItem(matchKey, JSON.stringify({ home: realHome, away: realAway, played: true, isOfficial: true }));
                            changesCount++;
                            break;
                        }
                    }
                }
            }
            if (changesCount > 0) { computeStandings(); refreshDisplay(); showNotification(`📡 ${changesCount} résultat(s) synchronisé(s) avec l'UEFA !`, 'success'); }
            lastSyncTime = new Date(); updateSyncIndicator();
        } catch (error) { console.error('Erreur synchronisation:', error); }
    }

    function updateSyncIndicator() {
        const indicator = document.getElementById('dbStatus');
        if (lastSyncTime) {
            const timeAgo = Math.floor((new Date() - lastSyncTime) / 1000);

    async function saveAllToDatabase() {
        if (isSaving) return;
        isSaving = true;
        try {
            for (let group in groupsConfig) {
                for (let match of groupsConfig[group].matches) {
                    if (match.played) {
                        await fetch(`${API_BASE}/match`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                matchId: match.key, homeTeam: match.home, awayTeam: match.away,
                                homeScore: match.homeScore, awayScore: match.awayScore,
                                groupName: group, stage: 'GROUP_STAGE', isOfficial: match.isOfficial || false
                            })
                        });
                    }
                }
            }
            for (let [matchId, winner] of Object.entries(knockoutWinners)) {
                await fetch(`${API_BASE}/knockout`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ matchId: matchId, winner: winner, round: matchId.split('_')[0] })
                });
            }
        } catch (error) { console.error('Erreur sauvegarde:', error); }
        finally { isSaving = false; }
    }

    async function loadFromDatabase() {
        try {
            const response = await fetch(`${API_BASE}/load`);
            const data = await response.json();
            if (data.scores) {
                for (let [matchId, score] of Object.entries(data.scores)) {
                    for (let group in groupsConfig) {
                        const match = groupsConfig[group].matches.find(m => m.key === matchId);
                        if (match) {
                            match.homeScore = score.home; match.awayScore = score.away;
                            match.played = score.played; match.isOfficial = score.isOfficial || false;
                            localStorage.setItem(matchId, JSON.stringify({ home: score.home, away: score.away, played: score.played, isOfficial: score.isOfficial }));
                            break;
                        }
                    }
                }
            }
            if (data.knockoutWinners) {
                knockoutWinners = {};
                Object.assign(knockoutWinners, data.knockoutWinners);
                localStorage.setItem('knockoutWinners', JSON.stringify(knockoutWinners));
            }
            computeStandings(); refreshDisplay();
            return true;
        } catch (error) { console.error('Erreur chargement BD:', error); return false; }
    }

    function initScores() {
        for (let group in groupsConfig) {
            const teams = groupsConfig[group].teams;
            groupsConfig[group].matches = [];
            for (let i = 0; i < teams.length; i++) {
                for (let j = i + 1; j < teams.length; j++) {
                    const matchKey = `${group}_${teams[i]}_${teams[j]}`;
                    if (!localStorage.getItem(matchKey)) {
                        localStorage.setItem(matchKey, JSON.stringify({ home: 0, away: 0, played: false, isOfficial: false }));
                    }
                    const saved = JSON.parse(localStorage.getItem(matchKey));
                    groupsConfig[group].matches.push({
                        home: teams[i], away: teams[j], key: matchKey,
                        homeScore: saved.home || 0, awayScore: saved.away || 0,

                }
            }
        }

    function saveScore(matchKey, homeScore, awayScore) {
        for (let group in groupsConfig) {
            const match = groupsConfig[group].matches.find(m => m.key === matchKey);
            if (match) {
                match.homeScore = homeScore; match.awayScore = awayScore;

                localStorage.setItem(matchKey, JSON.stringify({ home: homeScore, away: awayScore, played: true, isOfficial: match.isOfficial }));

    }

    function computeStandings() {
        groupStandings = {};
        for (let group in groupsConfig) {
            const teams = groupsConfig[group].teams;
            const stats = {};
            teams.forEach(t => stats[t] = { pts: 0, gf: 0, ga: 0, gd: 0, played: 0, wins: 0, draws: 0, losses: 0 });
            for (let match of groupsConfig[group].matches) {
                if (match.played) {
                    const home = match.home, away = match.away;
                    stats[home].gf += match.homeScore; stats[home].ga += match.awayScore;
                    stats[away].gf += match.awayScore; stats[away].ga += match.homeScore;
                    stats[home].played++; stats[away].played++;
                    if (match.homeScore > match.awayScore) { stats[home].pts += 3; stats[home].wins++; stats[away].losses++; }
                    else if (match.homeScore < match.awayScore) { stats[away].pts += 3; stats[away].wins++; stats[home].losses++; }
                    else { stats[home].pts += 1; stats[away].pts += 1; stats[home].draws++; stats[away].draws++; }
                }
            }
            for (let t in stats) stats[t].gd = stats[t].gf - stats[t].ga;
            const sorted = [...teams].sort((a, b) => {
                if (stats[a].pts !== stats[b].pts) return stats[b].pts - stats[a].pts;
                if (stats[a].gd !== stats[b].gd) return stats[b].gd - stats[a].gd;
                if (stats[a].gf !== stats[b].gf) return stats[b].gf - stats[a].gf;
                return 0;
            });
            groupStandings[group] = sorted.map(t => ({ team: t, ...stats[t] }));
        }
    }

    function getQualifiedTeams() {
        const firstPlaces = {}, secondPlaces = {}, thirdPlaces = [];
        for (let group in groupStandings) {
            const standings = groupStandings[group];
            if (standings[0]) firstPlaces[group] = standings[0].team;
            if (standings[1]) secondPlaces[group] = standings[1].team;
            if (standings[2]) thirdPlaces.push({ team: standings[2].team, group, pts: standings[2].pts, gd: standings[2].gd, gf: standings[2].gf });
        }
        thirdPlaces.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
        const bestThirds = thirdPlaces.slice(0, 8).map(t => t.team);
        return { firstPlaces, secondPlaces, bestThirds };
    }

            await autoSave();
            showFullBracket();
            showNotification(`✅ ${choice} qualifié pour le tour suivant !`, 'success');
            if (matchId === 'final') {
                canvasConfetti({ particleCount: 500, spread: 150, origin: { y: 0.6 } });
                setTimeout(() => showNotification(`🏆🏆🏆 CHAMPION DU MONDE 2026 : ${choice} !!! 🏆🏆🏆`, 'success'), 500);
            }
        }
    }

    async function selectWinner(matchId, teamA, teamB) {
        if (teamA === '???' || teamB === '???') { showNotification('❌ Ce match n\'est pas encore déterminé', 'warning'); return; }
        const choice = prompt(`Choisissez le vainqueur:\n1. ${teamA}\n2. ${teamB}`, teamA);
        if (choice === teamA || choice === teamB) {
            knockoutWinners[matchId] = choice;
            localStorage.setItem('knockoutWinners', JSON.stringify(knockoutWinners));
            await autoSave();
            showBracket();
            if (matchId === 'final') {
                canvasConfetti({ particleCount: 500, spread: 150, origin: { y: 0.6 } });
                setTimeout(() => alert(`🏆🏆🏆 CHAMPION DU MONDE 2026 : ${choice} !!! 🏆🏆🏆`), 300);
            }
        }
    }

    async function resetAll() {
        if (confirm('⚠️ Reset complet ?')) {
            await fetch(`${API_BASE}/reset`, { method: 'DELETE' });
            localStorage.clear(); knockoutWinners = {}; initScores(); computeStandings(); showGroups();
            showNotification('✅ Reset effectué', 'success');
        }
    }

    const savedWinners = localStorage.getItem('knockoutWinners');
    if (savedWinners) knockoutWinners = JSON.parse(savedWinners);
    initScores(); computeStandings(); loadFromDatabase().then(() => showGroups());
    setInterval(() => { if (mode === 'official') syncWithOfficial(); }, 30000);
</script>
</body>
</html>
