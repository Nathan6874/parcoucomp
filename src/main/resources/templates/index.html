<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ParcouComp 2026 - Suivi officiel</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%230a2f1f' stroke='%23fbbf24' stroke-width='3'/%3E%3Cpath d='M50 15 L55 35 L75 35 L60 48 L68 68 L50 55 L32 68 L40 48 L25 35 L45 35 Z' fill='%23fbbf24'/%3E%3Ctext x='50' y='88' text-anchor='middle' font-size='14' fill='%23fbbf24' font-weight='bold' font-family='Arial'%3E26%3C/text%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        body { background: linear-gradient(145deg, #0a2f1f 0%, #0a1f12 100%); }
        .main-container { max-width: 95vw !important; width: 95% !important; margin: 0 auto; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #fbbf24; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .group-winner { border-left: 4px solid #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .group-runner { border-left: 4px solid #94a3b8; background: rgba(148, 163, 184, 0.05); }
        .official-match { background: rgba(34, 197, 94, 0.15); border-left: 4px solid #22c55e; }
        .notification { position: fixed; top: 20px; right: 20px; z-index: 1000; animation: slideIn 0.3s ease; padding: 0.75rem 1.5rem; border-radius: 0.75rem; color: white; font-weight: bold; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .scroll-top-btn {
            position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            z-index: 1000; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: none; opacity: 0; visibility: hidden;
        }
        .scroll-top-btn.show { opacity: 1; visibility: visible; }
        .scroll-top-btn:hover { transform: scale(1.1); }
        .scroll-top-btn i { color: #1a1a2e; font-size: 1.5rem; }
        @media (max-width: 640px) { .scroll-top-btn { width: 45px; height: 45px; } }
        .match-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 0.75rem;
            background: rgba(0,0,0,0.3);
            border-radius: 0.5rem;
            margin-bottom: 0.25rem;
        }
        .match-result .score {
            font-weight: bold;
            color: #fbbf24;
            font-size: 0.95rem;
        }
        .match-result .teams {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
        }
        .match-result .teams .flag { font-size: 1.1rem; }
        .match-result .teams .name { white-space: nowrap; }
        .tab-active {
            border-bottom: 3px solid #fbbf24;
            color: #fbbf24;
            font-weight: 700;
        }

        /* Bracket styles */
        .bracket-container {
            display: flex;
            flex-direction: row;
            overflow-x: auto;
            gap: 2rem;
            padding: 1rem 0;
            justify-content: center;
        }
        .bracket-round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            min-width: 260px;
            position: relative;
        }
        @media (max-width: 640px) { .bracket-round { min-width: 220px; } }
        .round-title {
            text-align: center;
            font-weight: bold;
            padding: 0.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.25), rgba(245, 158, 11, 0.1));
            border-radius: 0.5rem;
            font-size: 0.85rem;
            border: 1px solid rgba(251, 191, 36, 0.3);
            white-space: nowrap;
        }
        .bracket-match-item {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 0.5rem;
            padding: 0.5rem;
            margin: 0.4rem 0;
            border-left: 3px solid #fbbf24;
            transition: all 0.2s;
        }
        .bracket-match-item.has-winner {
            border-left-color: #22c55e;
            background: linear-gradient(90deg, rgba(34, 197, 94, 0.15), rgba(0,0,0,0.4));
        }
        .bracket-match-item .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            gap: 0.25rem;
        }
        .bracket-match-item .match-team {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            width: 40%;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        .bracket-match-item .match-team-right { justify-content: flex-end; }
        .bracket-match-item .match-vs { font-size: 0.65rem; color: #9ca3af; font-weight: bold; }
        .bracket-match-item .winner-indicator { font-size: 0.55rem; margin-top: 0.2rem; text-align: center; color: #fbbf24; }
        .winner-badge { background: #fbbf24; color: #000; font-weight: bold; border-radius: 0.5rem; padding: 0.15rem 0.4rem; font-size: 0.65rem; }
    </style>
</head>
<body class="text-gray-200">

<div class="main-container px-3 py-4 md:px-4 md:py-6">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl md:text-4xl font-bold text-center flex-1">
            🏆 ParcouComp 2026
        </h1>
        <div id="syncStatus" class="text-[10px] md:text-xs bg-gray-800 px-3 py-1 rounded-full flex items-center gap-2">
            <span id="syncDot" class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span id="syncText">Sync UEFA</span>
        </div>
    </div>

    <p class="text-center text-gray-400 text-sm mb-4">📡 Résultats officiels UEFA - Mise à jour automatique</p>

    <!-- Navigation -->
    <div class="flex gap-2 md:gap-4 mb-6 flex-wrap justify-center">
        <button onclick="showGroups()" id="btnGroups" class="tab-btn bg-blue-600 px-4 py-2 rounded-lg font-semibold hover:bg-blue-700 transition text-sm tab-active">📊 Groupes</button>
        <button onclick="showStandings()" id="btnStandings" class="tab-btn bg-gray-700 px-4 py-2 rounded-lg font-semibold hover:bg-gray-600 transition text-sm">📈 Classements</button>
        <button onclick="showBracket()" id="btnBracket" class="tab-btn bg-red-600 px-4 py-2 rounded-lg font-semibold hover:bg-red-700 transition text-sm">🏆 Bracket</button>
        <button onclick="manualSync()" class="bg-cyan-600 px-4 py-2 rounded-lg font-semibold hover:bg-cyan-700 transition text-sm">📡 Sync UEFA</button>
        <button onclick="resetAll()" class="bg-gray-600 px-4 py-2 rounded-lg font-semibold hover:bg-gray-500 transition text-sm">🔄 Reset</button>
    </div>

    <!-- Contenu -->
    <div id="content" class="bg-black/40 rounded-2xl p-4 md:p-6">
        <div class="text-center py-10">
            <div class="loading mx-auto mb-4"></div>
            <p>Chargement des résultats officiels...</p>
        </div>
    </div>
</div>

<!-- Bouton retour en haut -->
<div id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTop()">
    <i class="fas fa-arrow-up"></i>
</div>

<script>
    // ========== CONFIGURATION ==========
    const API_BASE = '/api/fifa';
    const PREDICTIONS_API = '/api/predictions';

    // ========== GROUPES OFFICIELS ==========
    const groupsConfig = {
        'Groupe A': { teams: ['Mexico', 'South Africa', 'South Korea', 'Czechia'], matches: [] },
        'Groupe B': { teams: ['Canada', 'Bosnia-Herzegovina', 'Qatar', 'Switzerland'], matches: [] },
        'Groupe C': { teams: ['Brazil', 'Haiti', 'Scotland', 'Morocco'], matches: [] },
        'Groupe D': { teams: ['United States', 'Paraguay', 'Australia', 'Turkey'], matches: [] },
        'Groupe E': { teams: ['Germany', 'Curaçao', 'Ivory Coast', 'Ecuador'], matches: [] },
        'Groupe F': { teams: ['Netherlands', 'Japan', 'Sweden', 'Tunisia'], matches: [] },
        'Groupe G': { teams: ['Belgium', 'Egypt', 'Iran', 'New Zealand'], matches: [] },
        'Groupe H': { teams: ['Spain', 'Cape Verde Islands', 'Saudi Arabia', 'Uruguay'], matches: [] },
        'Groupe I': { teams: ['France', 'Senegal', 'Iraq', 'Norway'], matches: [] },
        'Groupe J': { teams: ['Argentina', 'Algeria', 'Austria', 'Jordan'], matches: [] },
        'Groupe K': { teams: ['Portugal', 'Congo DR', 'Uzbekistan', 'Colombia'], matches: [] },
        'Groupe L': { teams: ['England', 'Croatia', 'Ghana', 'Panama'], matches: [] }
    };

    // ========== DRAPEAUX ==========
    const flagMap = {
        'Uruguay': '🇺🇾', 'Germany': '🇩🇪', 'Spain': '🇪🇸', 'Paraguay': '🇵🇾',
        'Argentina': '🇦🇷', 'Ghana': '🇬🇭', 'Brazil': '🇧🇷', 'Portugal': '🇵🇹',
        'Japan': '🇯🇵', 'Mexico': '🇲🇽', 'England': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'United States': '🇺🇸',
        'South Korea': '🇰🇷', 'France': '🇫🇷', 'South Africa': '🇿🇦', 'Algeria': '🇩🇿',
        'Australia': '🇦🇺', 'New Zealand': '🇳🇿', 'Switzerland': '🇨🇭', 'Ecuador': '🇪🇨',
        'Sweden': '🇸🇪', 'Czechia': '🇨🇿', 'Croatia': '🇭🇷', 'Saudi Arabia': '🇸🇦',
        'Tunisia': '🇹🇳', 'Turkey': '🇹🇷', 'Senegal': '🇸🇳', 'Belgium': '🇧🇪',
        'Morocco': '🇲🇦', 'Austria': '🇦🇹', 'Colombia': '🇨🇴', 'Egypt': '🇪🇬',
        'Canada': '🇨🇦', 'Haiti': '🇭🇹', 'Iran': '🇮🇷', 'Bosnia-Herzegovina': '🇧🇦',
        'Panama': '🇵🇦', 'Cape Verde Islands': '🇨🇻', 'Congo DR': '🇨🇩', 'Ivory Coast': '🇨🇮',
        'Qatar': '🇶🇦', 'Jordan': '🇯🇴', 'Iraq': '🇮🇶', 'Uzbekistan': '🇺🇿',
        'Netherlands': '🇳🇱', 'Norway': '🇳🇴', 'Scotland': '🏴󠁧󠁢󠁳󠁣󠁴󠁿', 'Curaçao': '🇨🇼'
    };

    let groupStandings = {};
    let knockoutWinners = {};
    let currentView = 'groups';
    let isSyncing = false;
    let lastSyncTime = null;

    function getFlagEmoji(team) { return flagMap[team] || '⚽'; }

    // ========== INITIALISATION DES MATCHS ==========
    function initMatches() {
        for (let group in groupsConfig) {
            const teams = groupsConfig[group].teams;
            groupsConfig[group].matches = [];
            for (let i = 0; i < teams.length; i++) {
                for (let j = i + 1; j < teams.length; j++) {
                    const matchKey = `${group}_${teams[i]}_${teams[j]}`;
                    const saved = localStorage.getItem(matchKey);
                    if (saved) {
                        const data = JSON.parse(saved);
                        groupsConfig[group].matches.push({
                            home: teams[i], away: teams[j], key: matchKey,
                            homeScore: data.home || 0, awayScore: data.away || 0,
                            played: data.played || false, isOfficial: data.isOfficial || false
                        });
                    } else {
                        groupsConfig[group].matches.push({
                            home: teams[i], away: teams[j], key: matchKey,
                            homeScore: 0, awayScore: 0, played: false, isOfficial: false
                        });
                    }
                }
            }
        }
    }

    // ========== SYNCHRONISATION AVEC L'API ==========
    async function syncWithOfficial() {
        if (isSyncing) return;
        isSyncing = true;
        document.getElementById('syncDot').className = 'w-2 h-2 bg-yellow-500 rounded-full animate-pulse';
        document.getElementById('syncText').textContent = 'Synchronisation...';

        try {
            const response = await fetch(`${API_BASE}/matches/finished`);
            if (!response.ok) throw new Error('Erreur API');
            const data = await response.json();
            let changesCount = 0;
            let syncedMatches = [];

            for (let match of data.matches || []) {
                if (match.status === 'FINISHED' && match.score?.fullTime?.home !== null) {
                    const homeTeam = match.homeTeam?.name;
                    const awayTeam = match.awayTeam?.name;
                    if (!homeTeam || !awayTeam) continue;

                    const groupName = match.group ? `Groupe ${match.group.replace('GROUP_', '')}` : null;
                    const realHome = match.score.fullTime.home;
                    const realAway = match.score.fullTime.away;

                    let found = false;
                    if (groupName && groupsConfig[groupName]) {
                        const matchFound = groupsConfig[groupName].matches.find(m =>
                            m.home === homeTeam && m.away === awayTeam
                        );
                        if (matchFound && (!matchFound.played ||
                            matchFound.homeScore !== realHome ||
                            matchFound.awayScore !== realAway)) {
                            matchFound.homeScore = realHome;
                            matchFound.awayScore = realAway;
                            matchFound.played = true;
                            matchFound.isOfficial = true;
                            localStorage.setItem(matchFound.key, JSON.stringify({
                                home: realHome, away: realAway, played: true, isOfficial: true
                            }));
                            changesCount++;
                            syncedMatches.push(`${homeTeam} ${realHome}-${realAway} ${awayTeam}`);
                            found = true;
                        }
                    }

                    if (!found) {
                        for (let group in groupsConfig) {
                            const matchFound = groupsConfig[group].matches.find(m =>
                                m.home === homeTeam && m.away === awayTeam
                            );
                            if (matchFound && (!matchFound.played ||
                                matchFound.homeScore !== realHome ||
                                matchFound.awayScore !== realAway)) {
                                matchFound.homeScore = realHome;
                                matchFound.awayScore = realAway;
                                matchFound.played = true;
                                matchFound.isOfficial = true;
                                localStorage.setItem(matchFound.key, JSON.stringify({
                                    home: realHome, away: realAway, played: true, isOfficial: true
                                }));
                                changesCount++;
                                syncedMatches.push(`${homeTeam} ${realHome}-${realAway} ${awayTeam}`);
                                break;
                            }
                        }
                    }
                }
            }

            if (changesCount > 0) {
                computeStandings();
                // Recalculer le bracket si nécessaire
                if (currentView === 'bracket') showBracket();
                else refreshDisplay();
                showNotification(`📡 ${changesCount} résultat(s) synchronisé(s) !`, 'success');
                console.log('✅ Matchs synchronisés :', syncedMatches);
            } else {
                showNotification('✅ Aucun nouveau résultat', 'info');
            }
            lastSyncTime = new Date();
            document.getElementById('syncDot').className = 'w-2 h-2 bg-green-500 rounded-full animate-pulse';
            document.getElementById('syncText').textContent = `Sync ${Math.floor((new Date() - lastSyncTime) / 1000)}s`;
        } catch (error) {
            console.error('❌ Erreur synchronisation:', error);
            showNotification('⚠️ Erreur de synchronisation', 'warning');
            document.getElementById('syncDot').className = 'w-2 h-2 bg-red-500 rounded-full';
            document.getElementById('syncText').textContent = 'Erreur';
        }
        isSyncing = false;
    }

    function manualSync() { syncWithOfficial(); }

    // ========== CALCUL DES CLASSEMENTS ==========
    function computeStandings() {
        groupStandings = {};
        for (let group in groupsConfig) {
            const teams = groupsConfig[group].teams;
            const stats = {};
            teams.forEach(t => stats[t] = { pts: 0, gf: 0, ga: 0, gd: 0, played: 0, wins: 0, draws: 0, losses: 0 });

            for (let match of groupsConfig[group].matches) {
                if (match.played) {
                    const home = match.home, away = match.away;
                    stats[home].gf += match.homeScore;
                    stats[home].ga += match.awayScore;
                    stats[away].gf += match.awayScore;
                    stats[away].ga += match.homeScore;
                    stats[home].played++;
                    stats[away].played++;

                    if (match.homeScore > match.awayScore) {
                        stats[home].pts += 3;
                        stats[home].wins++;
                        stats[away].losses++;
                    } else if (match.homeScore < match.awayScore) {
                        stats[away].pts += 3;
                        stats[away].wins++;
                        stats[home].losses++;
                    } else {
                        stats[home].pts += 1;
                        stats[away].pts += 1;
                        stats[home].draws++;
                        stats[away].draws++;
                    }
                }
            }

            for (let t in stats) stats[t].gd = stats[t].gf - stats[t].ga;
            const sorted = [...teams].sort((a, b) => {
                if (stats[a].pts !== stats[b].pts) return stats[b].pts - stats[a].pts;
                if (stats[a].gd !== stats[b].gd) return stats[b].gd - stats[a].gd;
                if (stats[a].gf !== stats[b].gf) return stats[b].gf - stats[a].gf;
                return 0;
            });
            groupStandings[group] = sorted.map(t => ({ team: t, ...stats[t] }));
        }
    }

    // ========== QUALIFIÉS POUR LE BRACKET ==========
    function getQualifiedTeams() {
        const firstPlaces = {}, secondPlaces = {}, thirdPlaces = [];
        for (let group in groupStandings) {
            const standings = groupStandings[group];
            if (standings[0]) firstPlaces[group] = standings[0].team;
            if (standings[1]) secondPlaces[group] = standings[1].team;
            if (standings[2]) thirdPlaces.push({ team: standings[2].team, group, pts: standings[2].pts, gd: standings[2].gd, gf: standings[2].gf });
        }
        thirdPlaces.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
        const bestThirds = thirdPlaces.slice(0, 8).map(t => t.team);
        return { firstPlaces, secondPlaces, bestThirds };
    }

    // ========== AFFICHAGE DES GROUPES ==========
    function showGroups() {
        currentView = 'groups';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
        document.getElementById('btnGroups').classList.add('tab-active');

        let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
        for (let group in groupsConfig) {
            html += `<div class="bg-gray-800/50 rounded-xl p-4">
                <h2 class="text-xl font-bold text-yellow-400 mb-3">${group}</h2>
                <div class="space-y-1">`;
            for (let match of groupsConfig[group].matches) {
                const isOfficial = match.isOfficial && match.played;
                html += `
                    <div class="match-result ${isOfficial ? 'official-match' : ''}">
                        <div class="teams">
                            <span class="flag">${getFlagEmoji(match.home)}</span>
                            <span class="name">${match.home}</span>
                        </div>
                        <span class="score">${match.played ? match.homeScore + ' - ' + match.awayScore : 'vs'}</span>
                        <div class="teams">
                            <span class="name">${match.away}</span>
                            <span class="flag">${getFlagEmoji(match.away)}</span>
                        </div>
                    </div>`;
            }
            html += `</div></div>`;
        }
        html += `</div>
        <div class="mt-4 text-center text-xs text-gray-400">
            <span class="text-green-400">●</span> Résultats UEFA officiels
        </div>`;
        document.getElementById('content').innerHTML = html;
    }

    // ========== AFFICHAGE DES CLASSEMENTS ==========
    function showStandings() {
        currentView = 'standings';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
        document.getElementById('btnStandings').classList.add('tab-active');

        computeStandings();
        let html = `<div class="space-y-6">`;
        for (let group in groupStandings) {
            html += `<div class="bg-gray-800/50 rounded-xl p-4">
                <h2 class="text-xl font-bold text-yellow-400 mb-3">${group}</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-700"><tr class="text-left">
                            <th class="p-2">#</th><th>Équipe</th>
                            <th class="text-center">J</th><th class="text-center">G</th>
                            <th class="text-center">N</th><th class="text-center">P</th>
                            <th class="text-center">BP</th><th class="text-center">BC</th>
                            <th class="text-center">Diff</th><th class="text-center">Pts</th>
                        </tr></thead><tbody>`;
            groupStandings[group].forEach((team, idx) => {
                const isWinner = idx === 0;
                const isRunner = idx === 1;
                html += `<tr class="border-b border-gray-700 ${isWinner ? 'group-winner' : isRunner ? 'group-runner' : ''}">
                    <td class="p-2 font-bold">${idx+1}</td>
                    <td class="p-2">${getFlagEmoji(team.team)} ${team.team}</td>
                    <td class="p-2 text-center">${team.played}</td>
                    <td class="p-2 text-center text-green-400">${team.wins}</td>
                    <td class="p-2 text-center text-gray-400">${team.draws}</td>
                    <td class="p-2 text-center text-red-400">${team.losses}</td>
                    <td class="p-2 text-center">${team.gf}</td>
                    <td class="p-2 text-center">${team.ga}</td>
                    <td class="p-2 text-center font-bold ${team.gd>=0?'text-green-400':'text-red-400'}">${team.gd}</td>
                    <td class="p-2 text-center font-bold text-yellow-400">${team.pts}</td>
                </tr>`;
            });
            html += `</tbody></table></div></div>`;
        }
        html += `<div class="mt-4 p-3 bg-gray-800/30 rounded-lg text-center text-xs">
            <span class="text-yellow-400">●</span> Qualifié (1er) &nbsp;
            <span class="text-gray-400">●</span> Qualifié (2e) &nbsp;
            <span class="text-green-400">●</span> Meilleurs 3èmes
        </div></div>`;
        document.getElementById('content').innerHTML = html;
    }

    // ========== AFFICHAGE DU BRACKET ==========
    function showBracket() {
        currentView = 'bracket';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
        document.getElementById('btnBracket').classList.add('tab-active');

        const { firstPlaces, secondPlaces, bestThirds } = getQualifiedTeams();

        if (Object.keys(firstPlaces).length < 12) {
            document.getElementById('content').innerHTML = `<div class="text-center py-10">⏳ En attente des qualifiés pour générer le bracket...</div>`;
            return;
        }

        // Construction des matchs
        const round32 = [
            { id: "32_0", teamA: firstPlaces['Groupe A'] || '???', teamB: bestThirds[0] || '???', winner: knockoutWinners["32_0"] || null },
            { id: "32_1", teamA: secondPlaces['Groupe B'] || '???', teamB: secondPlaces['Groupe A'] || '???', winner: knockoutWinners["32_1"] || null },
            { id: "32_2", teamA: firstPlaces['Groupe C'] || '???', teamB: bestThirds[1] || '???', winner: knockoutWinners["32_2"] || null },
            { id: "32_3", teamA: secondPlaces['Groupe D'] || '???', teamB: secondPlaces['Groupe C'] || '???', winner: knockoutWinners["32_3"] || null },
            { id: "32_4", teamA: firstPlaces['Groupe E'] || '???', teamB: bestThirds[2] || '???', winner: knockoutWinners["32_4"] || null },
            { id: "32_5", teamA: secondPlaces['Groupe F'] || '???', teamB: secondPlaces['Groupe E'] || '???', winner: knockoutWinners["32_5"] || null },
            { id: "32_6", teamA: firstPlaces['Groupe G'] || '???', teamB: bestThirds[3] || '???', winner: knockoutWinners["32_6"] || null },
            { id: "32_7", teamA: secondPlaces['Groupe H'] || '???', teamB: secondPlaces['Groupe G'] || '???', winner: knockoutWinners["32_7"] || null },
            { id: "32_8", teamA: firstPlaces['Groupe I'] || '???', teamB: bestThirds[4] || '???', winner: knockoutWinners["32_8"] || null },
            { id: "32_9", teamA: secondPlaces['Groupe J'] || '???', teamB: secondPlaces['Groupe I'] || '???', winner: knockoutWinners["32_9"] || null },
            { id: "32_10", teamA: firstPlaces['Groupe K'] || '???', teamB: bestThirds[5] || '???', winner: knockoutWinners["32_10"] || null },
            { id: "32_11", teamA: secondPlaces['Groupe L'] || '???', teamB: secondPlaces['Groupe K'] || '???', winner: knockoutWinners["32_11"] || null },
            { id: "32_12", teamA: firstPlaces['Groupe B'] || '???', teamB: bestThirds[6] || '???', winner: knockoutWinners["32_12"] || null },
            { id: "32_13", teamA: secondPlaces['Groupe A'] || '???', teamB: secondPlaces['Groupe B'] || '???', winner: knockoutWinners["32_13"] || null },
            { id: "32_14", teamA: firstPlaces['Groupe D'] || '???', teamB: bestThirds[7] || '???', winner: knockoutWinners["32_14"] || null },
            { id: "32_15", teamA: secondPlaces['Groupe C'] || '???', teamB: secondPlaces['Groupe D'] || '???', winner: knockoutWinners["32_15"] || null }
        ];

        // Calcul des rounds suivants à partir des vainqueurs
        const round16 = [];
        for (let i = 0; i < 8; i++) {
            const w1 = knockoutWinners[`32_${i*2}`] || null;
            const w2 = knockoutWinners[`32_${i*2+1}`] || null;
            round16.push({ id: `16_${i}`, teamA: w1 || round32[i*2]?.teamA || '???', teamB: w2 || round32[i*2+1]?.teamA || '???', winner: knockoutWinners[`16_${i}`] || null });
        }

        const quarter = [];
        for (let i = 0; i < 4; i++) {
            const w1 = knockoutWinners[`16_${i*2}`] || null;
            const w2 = knockoutWinners[`16_${i*2+1}`] || null;
            quarter.push({ id: `quarter_${i}`, teamA: w1 || round16[i*2]?.teamA || '???', teamB: w2 || round16[i*2+1]?.teamA || '???', winner: knockoutWinners[`quarter_${i}`] || null });
        }

        const semi = [];
        for (let i = 0; i < 2; i++) {
            const w1 = knockoutWinners[`quarter_${i*2}`] || null;
            const w2 = knockoutWinners[`quarter_${i*2+1}`] || null;
            semi.push({ id: `semi_${i}`, teamA: w1 || quarter[i*2]?.teamA || '???', teamB: w2 || quarter[i*2+1]?.teamA || '???', winner: knockoutWinners[`semi_${i}`] || null });
        }

        const finalMatch = {
            id: 'final',
            teamA: knockoutWinners['semi_0'] || semi[0]?.teamA || '???',
            teamB: knockoutWinners['semi_1'] || semi[1]?.teamA || '???',
            winner: knockoutWinners['final'] || null
        };

        // Génération du HTML
        let html = `
            <div class="mb-4">
                <div class="bg-gradient-to-r from-amber-900/40 to-yellow-900/40 p-3 rounded-xl text-center border border-amber-500/30">
                    <h3 class="font-bold text-lg flex items-center justify-center gap-2">
                        <i class="fas fa-tree"></i> TABLEAU DES PHASES FINALES 2026 <i class="fas fa-chart-line"></i>
                    </h3>
                    <p class="text-xs text-gray-300 mt-1">Basé sur les résultats officiels UEFA</p>
                    <p class="text-[10px] text-amber-300/50 mt-0.5">Source : FIFA - Format 48 équipes</p>
                </div>
            </div>
            <div class="bracket-container">
        `;

        // Fonction pour générer une colonne
        function renderColumn(title, icon, matches) {
            let colHtml = `<div class="bracket-round">
                <div class="round-title"><i class="${icon} mr-1"></i> ${title}</div>`;
            for (let m of matches) {
                const hasWinner = m.winner && m.winner !== '???';
                const winnerClass = hasWinner ? 'has-winner' : '';
                colHtml += `
                    <div class="bracket-match-item ${winnerClass}">
                        <div class="match-teams">
                            <div class="match-team ${m.winner === m.teamA ? 'winner-badge' : ''}">
                                ${getFlagEmoji(m.teamA)} ${m.teamA}
                            </div>
                            <div class="match-vs">VS</div>
                            <div class="match-team match-team-right ${m.winner === m.teamB ? 'winner-badge' : ''}">
                                ${m.teamB} ${getFlagEmoji(m.teamB)}
                            </div>
                        </div>
                        ${hasWinner ? `<div class="winner-indicator">🏆 ${m.winner}</div>` : ''}
                    </div>`;
            }
            colHtml += `</div>`;
            return colHtml;
        }

        html += renderColumn("32ES DE FINALE", "fas fa-door-open", round32);
        html += renderColumn("16ES DE FINALE", "fas fa-arrow-right", round16);
        html += renderColumn("QUARTS DE FINALE", "fas fa-chart-line", quarter);
        html += renderColumn("DEMI-FINALES", "fas fa-trophy", semi);

        // Colonne Finale
        html += `<div class="bracket-round">
            <div class="round-title"><i class="fas fa-crown mr-1"></i> FINALE</div>
            <div class="bracket-match-item ${finalMatch.winner && finalMatch.winner !== '???' ? 'has-winner' : ''}" style="background:linear-gradient(135deg, rgba(220,38,38,0.3), rgba(0,0,0,0.5)); border:2px solid ${finalMatch.winner ? '#fbbf24' : 'rgba(251,191,36,0.3)'};">
                <div class="match-teams" style="font-size:0.85rem;">
                    <div class="match-team ${finalMatch.winner === finalMatch.teamA ? 'winner-badge' : ''}">
                        ${getFlagEmoji(finalMatch.teamA)} ${finalMatch.teamA}
                    </div>
                    <div class="match-vs" style="font-size:0.75rem; color:#fbbf24;">🏆</div>
                    <div class="match-team match-team-right ${finalMatch.winner === finalMatch.teamB ? 'winner-badge' : ''}">
                        ${finalMatch.teamB} ${getFlagEmoji(finalMatch.teamB)}
                    </div>
                </div>
                ${finalMatch.winner ? `<div class="winner-indicator" style="font-size:0.7rem; font-weight:bold; color:#fbbf24;">🏆 CHAMPION : ${finalMatch.winner} 🏆</div>` : '<div class="winner-indicator" style="font-size:0.55rem; color:#6b7280;">En attente</div>'}
            </div>
        </div>`;

        html += `</div>`;
        document.getElementById('content').innerHTML = html;
    }

    function refreshDisplay() {
        if (currentView === 'groups') showGroups();
        else if (currentView === 'standings') showStandings();
        else if (currentView === 'bracket') showBracket();
    }

    // ========== NOTIFICATIONS ==========
    function showNotification(message, type = 'info') {
        const colors = { info: 'bg-blue-600', success: 'bg-green-600', warning: 'bg-orange-600' };
        const notif = document.createElement('div');
        notif.className = `notification ${colors[type]}`;
        notif.innerHTML = message;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 4000);
    }

    // ========== SCROLL TOP ==========
    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
    window.addEventListener('scroll', function() {
        const btn = document.getElementById('scrollTopBtn');
        if (window.scrollY > 300) btn.classList.add('show');
        else btn.classList.remove('show');
    });

    // ========== RESET ==========
    async function resetAll() {
        if (confirm('⚠️ Reset complet ? Tous les scores seront effacés.')) {
            try {
                await fetch(`${PREDICTIONS_API}/reset`, { method: 'DELETE' });
            } catch(e) {}
            localStorage.clear();
            knockoutWinners = {};
            initMatches();
            computeStandings();
            showGroups();
            showNotification('✅ Reset effectué', 'success');
        }
    }

    // ========== INITIALISATION ==========
    initMatches();
    computeStandings();

    // Charger les données sauvegardées
    try {
        const response = await fetch(`${PREDICTIONS_API}/load`);
        const data = await response.json();
        if (data.scores) {
            for (let [matchId, score] of Object.entries(data.scores)) {
                for (let group in groupsConfig) {
                    const match = groupsConfig[group].matches.find(m => m.key === matchId);
                    if (match) {
                        match.homeScore = score.home;
                        match.awayScore = score.away;
                        match.played = score.played;
                        match.isOfficial = score.isOfficial || false;
                        localStorage.setItem(matchId, JSON.stringify({
                            home: score.home, away: score.away, played: score.played, isOfficial: score.isOfficial
                        }));
                        break;
                    }
                }
            }
        }
        if (data.knockoutWinners) {
            knockoutWinners = {};
            Object.assign(knockoutWinners, data.knockoutWinners);
        }
    } catch(e) {}

    // Synchronisation automatique au démarrage
    setTimeout(() => syncWithOfficial(), 500);

    // Synchronisation toutes les 60 secondes
    setInterval(() => syncWithOfficial(), 60000);

    showGroups();
</script>
</body>
</html>
